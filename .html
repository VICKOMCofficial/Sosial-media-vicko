<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VICKO OFFICIAL LINK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #4A7298; font-family: sans-serif; }
    .container { max-width: 500px; margin: 0 auto; padding: 0 15px; }

    /* BANNER - Menggunakan gambar dari Postimg Anda */
    .banner {
      width: 100%;
      height: auto;
      margin-top: 20px;
      border-radius: 8px;
      background: #333 url('https://i.postimg.cc/mD83m8tM/Screenshot-2026-03-14-13-24-41-48-40deb401b9ffe8e1df2f1cc5ba480b12.jpg') center/cover no-repeat;
      aspect-ratio: 3/1;
    }

    /* FOTO PROFIL - Menggunakan gambar profil dari Postimg Anda */
    .profile { display: flex; align-items: center; margin: 15px 0; }
    .profile-avatar {
      width: 60px; height: 60px; border-radius: 8px; margin-right: 10px;
      background: #eee url('https://i.postimg.cc/Y9pMvV8G/Screenshot-2026-03-14-13-24-34-45-40deb401b9ffe8e1df2f1cc5ba480b12.jpg') center/cover no-repeat;
    }
    .profile-text h2 { color: white; font-size: 1.2rem; font-weight: bold; }
    .profile-text p { color: white; font-size: 0.9rem; }

    /* SOSIAL MEDIA ICONS */
    .social-icons-bar { display: flex; margin: 15px 0; gap: 2px; }
    .social-icon { flex: 1; height: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .social-icon img { width: 28px; height: 28px; }
    
    .social-icon.facebook { background-color: #1877F2; }
    .social-icon.whatsapp { background-color: #25D366; }
    .social-icon.instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .social-icon.tiktok { background-color: #000; }

    /* TOMBOL LINK UTAMA */
    .main-buttons { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; }
    .main-button {
      display: flex; align-items: center; padding: 14px 20px;
      background-color: #2C2C2C; color: white; text-decoration: none;
      border-radius: 25px; font-size: 1rem; font-weight: bold;
    }
    .button-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin-right: 15px;
    }
    .button-icon img { width: 20px; height: 20px; }
    .button-icon.youtube { background-color: #FF0000; }
    .button-icon.whatsapp { background-color: #25D366; }

    .footer-button {
      display: block; width: fit-content; margin: 20px auto 30px;
      padding: 10px 20px; background-color: white; color: black;
      text-decoration: none; border-radius: 20px; font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="banner"></div>

    <div class="profile">
      <div class="profile-avatar"></div>
      <div class="profile-text">
        <h2>Link Official</h2>
        <p>Link media sosial saya👇</p>
      </div>
    </div>

    <div class="social-icons-bar">
      <a href="https://www.facebook.com/share/1B6eUpYnZF/" class="social-icon facebook" target="_blank">
        <img src="https://img.icons8.com/color/96/facebook-new.png" alt="FB">
      </a>
      <a href="https://wa.me/6282156460863" class="social-icon whatsapp" target="_blank">
        <img src="https://img.icons8.com/color/96/whatsapp.png" alt="WA">
      </a>
      <a href="https://www.instagram.com/vickodjulianfredricko" class="social-icon instagram" target="_blank">
        <img src="https://img.icons8.com/color/96/instagram-new.png" alt="IG">
      </a>
      <a href="https://www.tiktok.com/@vicko_mc_official" class="social-icon tiktok" target="_blank">
        <img src="https://img.icons8.com/lightcolor/96/tiktok.png" alt="TT">
      </a>
    </div>

    <div class="main-buttons">
      <a href="https://www.youtube.com/@vickomcclip" class="main-button" target="_blank">
        <span class="button-icon youtube">
          <img src="https://img.icons8.com/color/96/youtube-play.png" alt="YT">
        </span>
        YouTube VICKOCLIP
      </a>
      <a href="https://whatsapp.com/channel/0029VbCMAEZJZg40VqyM1O3n" class="main-button" target="_blank">
        <span class="button-icon whatsapp">
          <img src="https://img.icons8.com/color/96/whatsapp.png" alt="WA">
        </span>
        SALURAN WHATSAPP OFFICIAL
      </a>
    </div>

    <div class="footer-button">
      ⚙️ jangan lupa support kreator kecil ya:)
    </div>
  </div>
</body>
</html>
